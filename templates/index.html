<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SnakeGPT AI</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sb-head">
    <div class="logo">
      <div class="logo-mark">&gt;_</div>
      <div class="logo-text">Snake<em>GPT</em> <small>AI</small></div>
    </div>
    <button class="new-btn" onclick="newChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      New chat
    </button>
  </div>
  <div class="sb-label">Recent</div>
  <div id="history-list"></div>
  <div class="sb-foot">
    <div class="model-card">
      <div class="pulse"></div>
      <div class="model-info">
        <div class="name">LLaMA 3.3 70B</div>
        <div class="sub">Groq · Free · Fast</div>
      </div>
    </div>
  </div>
</div>

<div id="overlay" onclick="closeSidebar()"></div>

<!-- MAIN -->
<div id="main">

  <div id="topbar">
    <button class="tb-icon" onclick="toggleSidebar()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
    <div class="tb-logo">Snake<span style="font-style: italic; color: #4CAF50;">GPT</span> AI</div>
    <button class="tb-new" onclick="newChat()">+</button>
  </div>

  <div id="workspace">

    <!-- CHAT PANE -->
    <div id="chat-pane">
      <div id="chat">
        <div class="chat-inner" id="chat-inner">
          <div id="empty">
            <div class="empty-icon">🐍</div>
            <div class="empty-title">Snake<span style="font-style: italic;">GPT</span> AI</div>
            <div class="empty-sub">Professional coding assistant and OSINT intelligence center. Write, debug, explain — and preview HTML/CSS/JS live.</div>
            <div class="sugs">
              <button class="sug" onclick="suggest(this)"><b>Generate</b>Write a Python web scraper</button>
              <button class="sug" onclick="suggest(this)"><b>Analyze</b>Network reconnaissance</button>
              <button class="sug" onclick="suggest(this)"><b>Explain</b>How does async/await work?</button>
              <button class="sug" onclick="suggest(this)"><b>Intelligence</b>Gather OSINT data</button>
              <button class="sug" onclick="suggest(this)"><b>Preview</b>Make a cool CSS animation</button>
              <button class="sug" onclick="suggest(this)"><b>Debug</b>Fix the errors in my code</button>
            </div>
          </div>
        </div>
      </div>

      <div id="input-wrap">
        <div id="file-chip" class="file-chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span class="file-chip-name" id="file-chip-name"></span>
          <button class="file-chip-remove" onclick="removeFile()">✕</button>
        </div>
        <div class="input-box">
          <input type="file" id="file-input" accept=".png,.jpg,.jpeg,.rar,.zip,.js,.ts,.py,.html,.css,.txt,.md,.json,.log">
          <button class="upload-btn" onclick="openFilePicker()" title="Attach file">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </button>
          <textarea id="input" placeholder="Ask SnakeGPT anything about code..." rows="1"></textarea>
          <button id="send" onclick="sendMsg()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </button>
        </div>
        <div class="input-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line &nbsp;·&nbsp; 📎 attach files</div>
      </div>
    </div>

    <!-- PREVIEW PANE -->
    <div id="preview-pane">
      <div class="preview-head">
        <div class="preview-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9l3 3-3 3M13 15h3"/></svg>
          Live Preview
        </div>
        <div class="preview-actions">
          <button class="p-btn" onclick="refreshPreview()">↺ Refresh</button>
          <button class="p-btn danger" onclick="closePreview()">✕ Close</button>
        </div>
      </div>
      <iframe id="preview-frame" sandbox="allow-scripts"></iframe>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
